name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Run tests
        run: go test -race -count=1 ./...

      - name: Build binaries
        run: |
          GOOS=linux   GOARCH=amd64 go build -o dist/waggle-linux-amd64   ./cmd/waggle
          GOOS=linux   GOARCH=arm64 go build -o dist/waggle-linux-arm64   ./cmd/waggle
          GOOS=darwin  GOARCH=amd64 go build -o dist/waggle-darwin-amd64  ./cmd/waggle
          GOOS=darwin  GOARCH=arm64 go build -o dist/waggle-darwin-arm64  ./cmd/waggle
          GOOS=windows GOARCH=amd64 go build -o dist/waggle-windows-amd64.exe ./cmd/waggle

      - name: Create checksums
        working-directory: dist
        run: sha256sum * > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/waggle-*
            dist/checksums.txt
